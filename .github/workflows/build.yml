name: Padavan XY-C1 mwan3helper 纯净版

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装官方完整依赖（Debian/Ubuntu 原版）
        run: |
          sudo apt update
          sudo apt install -y unzip libtool-bin curl cmake gperf gawk flex bison nano xxd \
          fakeroot kmod cpio git python3-docutils gettext automake autopoint \
          texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin

      - name: 克隆源码 + 修复目录权限
        run: |
          sudo git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u
          git clone https://github.com/srfj/padavan-mwan3helper.git mwan3helper
          sudo chown -R $USER:$USER /opt/rt-n56u

      - name: 下载官方预编译工具链 + 用sudo创建软链接（修复权限）
        run: |
          cd /opt/rt-n56u/toolchain-mipsel
          sh dl_toolchain.sh
          # 加上sudo，获得创建根目录软链接的权限
          sudo ln -sf /opt/rt-n56u/toolchain-mipsel/toolchain-3.4.x /toolchain-3.4.x

      - name: 载入XY-C1配置
        run: |
          cd /opt/rt-n56u/trunk
          cp configs/templates/XY-C1.config .config

      - name: 集成mwan3helper插件
        run: |
          cd /opt/rt-n56u/trunk
          mkdir -p user/mwan3helper
          cp -rf $GITHUB_WORKSPACE/mwan3helper/* user/mwan3helper/
          echo "obj-y += mwan3helper/" >> user/Makefile
          echo "CONFIG_FIRMWARE_INCLUDE_MWAN3HELPER=y" >> .config

      - name: 自定义固件设置
        run: |
          cd /opt/rt-n56u/trunk
          sed -i 's/CONFIG_FIRMWARE_ENABLE_USB=y/CONFIG_FIRMWARE_ENABLE_USB=n/' .config
          sed -i 's/CONFIG_FIRMWARE_ENABLE_USB_EXT=y/CONFIG_FIRMWARE_ENABLE_USB_EXT=n/' .config
          sed -i 's/CONFIG_FIRMWARE_ENABLE_IPV6=n/CONFIG_FIRMWARE_ENABLE_IPV6=y/' .config
          sed -i 's/CONFIG_FIRMWARE_ENABLE_TELNET=n/CONFIG_FIRMWARE_ENABLE_TELNET=y/' .config
          sed -i 's/CONFIG_FIRMWARE_ENABLE_ALL_PLUGINS=y/CONFIG_FIRMWARE_ENABLE_ALL_PLUGINS=n/' .config

      - name: 官方标准编译
        run: |
          cd /opt/rt-n56u/trunk
          ./clear_tree
          fakeroot ./build_firmware.sh

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: XY-C1-Padavan-mwan3-ipv6
          path: /opt/rt-n56u/trunk/images/*.trx
